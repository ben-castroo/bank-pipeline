<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bank Pipeline · Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-800 font-sans min-h-screen">
  <div class="max-w-7xl mx-auto px-4 py-8 space-y-6">

    <!-- Header -->
    <div class="flex flex-wrap items-center justify-between gap-4">
      <div>
        <h1 class="text-2xl font-bold text-slate-900">Bank Pipeline Dashboard</h1>
        <p id="tz-label" class="text-sm text-slate-400 mt-0.5">Cargando estado...</p>
      </div>
      <div class="flex items-center gap-3">
        <span id="status-badge"
          class="px-3 py-1 rounded-full text-sm font-medium bg-gray-200 text-gray-600">—</span>
        <button id="run-btn" onclick="runETL()"
          class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 text-white text-sm font-semibold rounded-lg shadow transition">
          ▶ Ejecutar ETL
        </button>
      </div>
    </div>

    <!-- Metric Cards -->
    <div id="metrics-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3">
      <!-- filled by JS after /report -->
    </div>

    <!-- Logs + Data (side by side on large screens) -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

      <!-- Logs -->
      <div class="bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col">
        <div class="flex items-center justify-between px-5 py-3 border-b border-slate-100">
          <h2 class="font-semibold text-slate-700">Logs de procesamiento</h2>
          <button onclick="loadLogs()"
            class="text-xs text-indigo-500 hover:underline">↻ Actualizar</button>
        </div>
        <div id="log-container"
          class="font-mono text-xs p-4 h-80 overflow-y-auto bg-slate-900 rounded-b-xl leading-5 space-y-0.5">
          <span class="text-slate-400">Cargando...</span>
        </div>
      </div>

      <!-- Data Tables -->
      <div class="bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col">
        <div class="flex border-b border-slate-100">
          <button id="tab-raw" onclick="switchTab('raw')"
            class="px-5 py-3 text-sm font-semibold border-b-2 border-indigo-500 text-indigo-600">
            Datos crudos
          </button>
          <button id="tab-clean" onclick="switchTab('clean')"
            class="px-5 py-3 text-sm font-medium text-slate-500 hover:text-slate-700 border-b-2 border-transparent">
            Datos limpios
          </button>
          <span class="ml-auto self-center px-4 text-xs text-slate-400">últimos 50 registros</span>
        </div>
        <div class="overflow-auto h-80">
          <table class="w-full text-xs text-left">
            <thead id="table-head" class="bg-slate-50 text-slate-500 sticky top-0"></thead>
            <tbody id="table-body" class="divide-y divide-slate-100"></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

  <script>
    let currentTab = 'raw';
    let pollInterval = null;

    const STATUS_STYLE = {
      pending: 'bg-gray-200 text-gray-600',
      running: 'bg-amber-100 text-amber-700 animate-pulse',
      success: 'bg-emerald-100 text-emerald-700',
      error:   'bg-red-100 text-red-700',
    };
    const STATUS_LABEL = {
      pending: '⏳ Pendiente',
      running: '⚙️ Ejecutando…',
      success: '✅ Completado',
      error:   '❌ Error',
    };
    const LOG_COLOR = {
      INFO:    'text-sky-400',
      WARNING: 'text-amber-400',
      ERROR:   'text-red-400',
      DEBUG:   'text-slate-400',
    };
    const METRICS = [
      { key: 'registros_iniciales',      label: 'Iniciales',      warn: false },
      { key: 'duplicados_eliminados',    label: 'Duplicados',     warn: true  },
      { key: 'filas_fuera_de_rango',     label: 'Fuera de rango', warn: true  },
      { key: 'filas_categoria_invalida', label: 'Cat. inválida',  warn: true  },
      { key: 'filas_con_nulos_criticos', label: 'Nulos críticos', warn: true  },
      { key: 'registros_finales',        label: 'Finales',        warn: false },
    ];

    function esc(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ── Status ───────────────────────────────────────────────────────────────
    async function loadStatus() {
      try {
        const { etl } = await fetch('/health').then(r => r.json());
        const badge = document.getElementById('status-badge');
        badge.className = `px-3 py-1 rounded-full text-sm font-medium ${STATUS_STYLE[etl.state] ?? STATUS_STYLE.pending}`;
        badge.textContent = STATUS_LABEL[etl.state] ?? etl.state;

        const tzLabel = document.getElementById('tz-label');
        tzLabel.textContent = `Zona horaria: ${etl.timezone ?? 'UTC'}` +
          (etl.last_run ? ` · Última ejecución: ${etl.last_run.slice(0,19).replace('T',' ')}` : '');

        if (etl.state === 'running') {
          startPolling();
        } else {
          stopPolling();
          if (etl.state === 'success') {
            loadReport();
            loadTable(currentTab);
          }
        }
      } catch(e) {}
    }

    function startPolling() {
      if (!pollInterval) {
        pollInterval = setInterval(() => { loadStatus(); loadLogs(); }, 2500);
      }
    }
    function stopPolling() {
      if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
    }

    // ── Report metrics ───────────────────────────────────────────────────────
    async function loadReport() {
      try {
        const res = await fetch('/report');
        if (!res.ok) return;
        const data = await res.json();
        document.getElementById('metrics-grid').innerHTML = METRICS.map(m => {
          const val = data[m.key] ?? '—';
          const isWarn = m.warn && val > 0;
          const numColor = isWarn ? 'text-amber-600' : 'text-indigo-700';
          return `<div class="bg-white border border-slate-200 rounded-xl p-4 text-center shadow-sm">
            <p class="text-xs text-slate-400 mb-1">${m.label}</p>
            <p class="text-2xl font-bold ${numColor}">${Number(val).toLocaleString('es')}</p>
          </div>`;
        }).join('');
      } catch(e) {}
    }

    // ── Logs ─────────────────────────────────────────────────────────────────
    async function loadLogs() {
      try {
        const logs = await fetch('/logs').then(r => r.json());
        const el = document.getElementById('log-container');
        if (!logs.length) {
          el.innerHTML = '<span class="text-slate-500">Sin logs aún.</span>';
          return;
        }
        el.innerHTML = logs.map(l =>
          `<p><span class="text-slate-500">${esc(l.time)}</span> ` +
          `<span class="font-semibold ${LOG_COLOR[l.level] ?? 'text-white'}">[${l.level}]</span> ` +
          `<span class="text-slate-200">${esc(l.message)}</span></p>`
        ).join('');
      } catch(e) {}
    }

    // ── Data table ───────────────────────────────────────────────────────────
    async function loadTable(tab) {
      try {
        const rows = await fetch(`/data/${tab}`).then(r => r.json());
        if (!Array.isArray(rows) || !rows.length) {
          document.getElementById('table-head').innerHTML = '';
          document.getElementById('table-body').innerHTML =
            '<tr><td class="px-4 py-8 text-slate-400 text-center" colspan="99">Sin datos aún.</td></tr>';
          return;
        }
        const cols = Object.keys(rows[0]);
        document.getElementById('table-head').innerHTML =
          '<tr>' + cols.map(c =>
            `<th class="px-3 py-2 font-medium whitespace-nowrap">${esc(c)}</th>`
          ).join('') + '</tr>';
        document.getElementById('table-body').innerHTML = rows.map(r =>
          '<tr class="hover:bg-slate-50">' +
          cols.map(c => {
            const v = r[c];
            const display = v === null || v === undefined
              ? '<span class="text-slate-300">null</span>'
              : esc(String(v));
            return `<td class="px-3 py-1.5 whitespace-nowrap">${display}</td>`;
          }).join('') + '</tr>'
        ).join('');
      } catch(e) {}
    }

    function switchTab(tab) {
      currentTab = tab;
      ['raw', 'clean'].forEach(t => {
        const btn = document.getElementById(`tab-${t}`);
        if (t === tab) {
          btn.className = 'px-5 py-3 text-sm font-semibold border-b-2 border-indigo-500 text-indigo-600';
        } else {
          btn.className = 'px-5 py-3 text-sm font-medium text-slate-500 hover:text-slate-700 border-b-2 border-transparent';
        }
      });
      loadTable(tab);
    }

    // ── Run ETL ──────────────────────────────────────────────────────────────
    async function runETL() {
      const btn = document.getElementById('run-btn');
      btn.disabled = true;
      try {
        const res = await fetch('/run', { method: 'POST' });
        const data = await res.json();
        if (res.status === 409) {
          alert(data.message);
        } else {
          const badge = document.getElementById('status-badge');
          badge.className = `px-3 py-1 rounded-full text-sm font-medium ${STATUS_STYLE.running}`;
          badge.textContent = STATUS_LABEL.running;
          startPolling();
        }
      } catch(e) { alert('No se pudo iniciar el ETL'); }
      btn.disabled = false;
    }

    // ── Init ─────────────────────────────────────────────────────────────────
    loadStatus();
    loadReport();
    loadLogs();
    loadTable('raw');
  </script>
</body>
</html>

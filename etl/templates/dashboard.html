<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bank Pipeline · Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-800 font-sans min-h-screen">
  <div class="max-w-7xl mx-auto px-4 py-8 space-y-6">

    <!-- Header -->
    <div class="flex flex-wrap items-center justify-between gap-4">
      <div>
        <h1 class="text-2xl font-bold text-slate-900">Bank Pipeline Dashboard</h1>
        <p id="tz-label" class="text-sm text-slate-400 mt-0.5">Cargando estado...</p>
      </div>
      <div class="flex items-center gap-3">
        <span id="status-badge"
          class="px-3 py-1 rounded-full text-sm font-medium bg-gray-200 text-gray-600">—</span>
        <button id="run-btn" onclick="runETL()"
          class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 text-white text-sm font-semibold rounded-lg shadow transition">
          ▶ Ejecutar ETL
        </button>
        <button onclick="truncateTables()"
          class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white text-sm font-semibold rounded-lg shadow transition"
          title="Vacía bank_raw, bank_clean y etl_reports en Render y Supabase">
          🗑 Vaciar tablas
        </button>
      </div>
    </div>

    <!-- Upload CSV -->
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
      <h2 class="font-semibold text-slate-700 mb-3">Cargar archivo de datos</h2>
      <div class="flex flex-wrap items-center gap-4">
        <!-- Drop zone -->
        <label id="drop-zone"
          class="flex-1 min-w-[220px] flex flex-col items-center justify-center gap-2 border-2 border-dashed border-slate-300 hover:border-indigo-400 rounded-xl p-5 cursor-pointer transition"
          ondragover="event.preventDefault(); this.classList.add('border-indigo-500','bg-indigo-50')"
          ondragleave="this.classList.remove('border-indigo-500','bg-indigo-50')"
          ondrop="handleDrop(event)">
          <svg class="w-8 h-8 text-slate-300" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
          </svg>
          <span class="text-sm text-slate-400">Arrastra un CSV aquí o <span class="text-indigo-500 underline">selecciona archivo</span></span>
          <span class="text-xs text-slate-300">.csv · .xlsx · .xls</span>
          <input id="file-input" type="file" accept=".csv,.xlsx,.xls" class="hidden" onchange="handleFileSelect(event)" />
        </label>
        <!-- Info actual -->
        <div class="flex flex-col gap-2 min-w-[200px]">
          <div class="text-xs text-slate-500">
            <span class="font-medium text-slate-700">Archivo activo:</span>
            <span id="active-file-name" class="ml-1 font-mono text-indigo-600">—</span>
            <span id="active-file-source"
              class="ml-2 px-2 py-0.5 rounded-full text-xs bg-slate-100 text-slate-400">—</span>
          </div>
          <div id="upload-status" class="text-xs text-slate-400 min-h-[1.2rem]"></div>
          <button id="upload-run-btn" onclick="uploadAndRun()" disabled
            class="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 disabled:opacity-40 text-white text-sm font-semibold rounded-lg shadow transition">
            ↑ Subir y ejecutar ETL
          </button>
        </div>
      </div>
    </div>

    <!-- Metric Cards -->
    <div id="metrics-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3">
      <!-- filled by JS after /report -->
    </div>

    <!-- Logs + Data (side by side on large screens) -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

      <!-- Logs -->
      <div class="bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col">
        <!-- Tabs de logs -->
        <div class="flex items-center justify-between border-b border-slate-100">
          <div class="flex">
            <button id="logtab-general" onclick="switchLogTab('general')"
              class="px-5 py-3 text-sm font-semibold border-b-2 border-indigo-500 text-indigo-600">
              General
            </button>
            <button id="logtab-granular" onclick="switchLogTab('granular')"
              class="px-5 py-3 text-sm font-medium text-slate-500 hover:text-slate-700 border-b-2 border-transparent flex items-center gap-1.5">
              Granulares
              <span id="granular-count" class="hidden px-1.5 py-0.5 rounded-full text-xs bg-sky-100 text-sky-600 font-semibold"></span>
            </button>
          </div>
          <div class="flex items-center gap-3 pr-4">
            <span class="flex items-center gap-1 text-xs text-emerald-600">
              <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span>en vivo
            </span>
            <button onclick="refreshLogTab()" class="text-xs text-indigo-500 hover:underline">↻ Actualizar</button>
          </div>
        </div>
        <!-- Contenedor General -->
        <div id="log-general-container"
          class="font-mono text-xs p-4 h-80 overflow-y-auto bg-slate-900 rounded-b-xl leading-5 space-y-0.5">
          <span class="text-slate-400">Cargando...</span>
        </div>
        <!-- Contenedor Granulares -->
        <div id="log-granular-container" class="hidden h-80 overflow-auto rounded-b-xl">
          <table class="w-full text-xs text-left">
            <thead class="bg-slate-50 text-slate-500 sticky top-0">
              <tr>
                <th class="px-3 py-2 font-medium">#fila</th>
                <th class="px-3 py-2 font-medium">Evento</th>
                <th class="px-3 py-2 font-medium">Detalle</th>
                <th class="px-3 py-2 font-medium">Datos originales</th>
              </tr>
            </thead>
            <tbody id="granular-body" class="divide-y divide-slate-100"></tbody>
          </table>
        </div>
      </div>

      <!-- Data Tables -->
      <div class="bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col">
        <div class="flex border-b border-slate-100">
          <button id="tab-raw" onclick="switchTab('raw')"
            class="px-5 py-3 text-sm font-semibold border-b-2 border-indigo-500 text-indigo-600">
            Datos crudos
          </button>
          <button id="tab-clean" onclick="switchTab('clean')"
            class="px-5 py-3 text-sm font-medium text-slate-500 hover:text-slate-700 border-b-2 border-transparent">
            Datos limpios
          </button>
          <button id="tab-rejected" onclick="switchTab('rejected')"
            class="px-5 py-3 text-sm font-medium text-slate-500 hover:text-slate-700 border-b-2 border-transparent flex items-center gap-1.5">
            Rechazados
            <span id="rejected-count" class="hidden px-1.5 py-0.5 rounded-full text-xs bg-red-100 text-red-600 font-semibold"></span>
          </button>
          <span class="ml-auto self-center px-4 flex items-center gap-2 text-xs text-slate-400">
            <span class="flex items-center gap-1 text-emerald-600">
              <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span>en vivo
            </span>
            últimos 50 registros
          </span>
        </div>
        <div class="overflow-auto h-80">
          <table class="w-full text-xs text-left">
            <thead id="table-head" class="bg-slate-50 text-slate-500 sticky top-0"></thead>
            <tbody id="table-body" class="divide-y divide-slate-100"></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

  <script>
    let currentTab = 'raw';
    let pollInterval = null;
    let _etlState = 'pending';  // espejo JS del estado del ETL

    const STATUS_STYLE = {
      pending: 'bg-gray-200 text-gray-600',
      running: 'bg-amber-100 text-amber-700 animate-pulse',
      success: 'bg-emerald-100 text-emerald-700',
      error:   'bg-red-100 text-red-700',
    };
    const STATUS_LABEL = {
      pending: '⏳ Pendiente',
      running: '⚙️ Ejecutando…',
      success: '✅ Completado',
      error:   '❌ Error',
    };
    const LOG_COLOR = {
      INFO:    'text-sky-400',
      WARNING: 'text-amber-400',
      ERROR:   'text-red-400',
      DEBUG:   'text-slate-400',
    };
    const METRICS = [
      { key: 'registros_iniciales',      label: 'Iniciales',      warn: false },
      { key: 'duplicados_eliminados',    label: 'Duplicados',     warn: true  },
      { key: 'filas_fuera_de_rango',     label: 'Fuera de rango', warn: true  },
      { key: 'filas_categoria_invalida', label: 'Cat. inválida',  warn: true  },
      { key: 'filas_con_nulos_criticos', label: 'Nulos críticos', warn: true  },
      { key: 'registros_finales',        label: 'Finales',        warn: false },
    ];

    const REASON_COLOR = {
      'duplicado':          'bg-amber-100 text-amber-700',
      'fuera_de_rango':     'bg-orange-100 text-orange-700',
      'categoria_invalida': 'bg-red-100 text-red-700',
      'nulo_critico':       'bg-purple-100 text-purple-700',
    };

    function esc(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ── Status ───────────────────────────────────────────────────────────────
    async function loadStatus() {
      try {
        const { etl } = await fetch('/health').then(r => r.json());
        _etlState = etl.state;  // actualizar espejo JS
        const badge = document.getElementById('status-badge');
        badge.className = `px-3 py-1 rounded-full text-sm font-medium ${STATUS_STYLE[etl.state] ?? STATUS_STYLE.pending}`;
        badge.textContent = STATUS_LABEL[etl.state] ?? etl.state;

        const tzLabel = document.getElementById('tz-label');
        tzLabel.textContent = `Zona horaria: ${etl.timezone ?? 'UTC'}` +
          (etl.last_run ? ` · Última ejecución: ${etl.last_run.slice(0,19).replace('T',' ')}` : '');

        if (etl.state === 'running') {
          startPolling();
        } else {
          stopPolling();
          if (etl.state === 'success') {
            loadReport();
            loadTable(currentTab);
          }
        }
      } catch(e) {}
    }

    function startPolling() {
      if (!pollInterval) {
        pollInterval = setInterval(() => { loadStatus(); loadLogs(); }, 2500);
      }
    }
    function stopPolling() {
      if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
    }

    // ── Report metrics ───────────────────────────────────────────────────────
    async function loadReport() {
      try {
        const res = await fetch('/report');
        if (!res.ok) return;
        const data = await res.json();
        document.getElementById('metrics-grid').innerHTML = METRICS.map(m => {
          const val = data[m.key] ?? '—';
          const isWarn = m.warn && val > 0;
          const numColor = isWarn ? 'text-amber-600' : 'text-indigo-700';
          return `<div class="bg-white border border-slate-200 rounded-xl p-4 text-center shadow-sm">
            <p class="text-xs text-slate-400 mb-1">${m.label}</p>
            <p class="text-2xl font-bold ${numColor}">${Number(val).toLocaleString('es')}</p>
          </div>`;
        }).join('');
      } catch(e) {}
    }

    // ── Logs generales ──────────────────────────────────────────────────────────────
    async function loadLogs() {
      try {
        const logs = await fetch('/logs').then(r => r.json());
        const el = document.getElementById('log-general-container');
        if (!logs.length) {
          el.innerHTML = '<span class="text-slate-500">Sin logs aún.</span>';
          return;
        }
        el.innerHTML = logs.map(l =>
          `<p><span class="text-slate-500">${esc(l.time)}</span> ` +
          `<span class="font-semibold ${LOG_COLOR[l.level] ?? 'text-white'}">[${l.level}]</span> ` +
          `<span class="text-slate-200">${esc(l.message)}</span></p>`
        ).join('');
      } catch(e) {}
    }

    // ── Logs granulares ─────────────────────────────────────────────────────────
    const EVENT_COLOR = {
      'normalizado':      'bg-sky-100 text-sky-700',
      'binario_invalido': 'bg-orange-100 text-orange-700',
    };

    async function loadGranularLogs() {
      try {
        const logs = await fetch('/logs/granular').then(r => r.json());
        const tbody = document.getElementById('granular-body');
        const badge = document.getElementById('granular-count');
        if (!Array.isArray(logs) || !logs.length) {
          tbody.innerHTML = '<tr><td class="px-4 py-8 text-slate-400 text-center" colspan="4">Sin eventos granulares aún. Ejecuta el ETL primero.</td></tr>';
          badge.classList.add('hidden');
          return;
        }
        badge.textContent = logs.length;
        badge.classList.remove('hidden');
        tbody.innerHTML = logs.map(r => {
          const cls = EVENT_COLOR[r.event] ?? 'bg-slate-100 text-slate-600';
          const snapHtml = r.snapshot
            ? `<details class="cursor-pointer"><summary class="text-indigo-500 hover:underline">ver datos</summary>` +
              `<pre class="mt-1 text-slate-500 whitespace-pre-wrap break-all max-w-xs">${esc(JSON.stringify(r.snapshot, null, 2))}</pre></details>`
            : '—';
          return `<tr class="hover:bg-slate-50">
            <td class="px-3 py-1.5 font-mono text-slate-500">${esc(String(r.row_index))}</td>
            <td class="px-3 py-1.5"><span class="px-2 py-0.5 rounded-full text-xs font-medium ${cls}">${esc(r.event)}</span></td>
            <td class="px-3 py-2 text-slate-700 max-w-xs break-words">${esc(r.detail)}</td>
            <td class="px-3 py-1.5">${snapHtml}</td>
          </tr>`;
        }).join('');
      } catch(e) {}
    }

    // ── Tabs de logs ───────────────────────────────────────────────────────────────
    let currentLogTab = 'general';
    function switchLogTab(tab) {
      currentLogTab = tab;
      document.getElementById('log-general-container').classList.toggle('hidden', tab !== 'general');
      document.getElementById('log-granular-container').classList.toggle('hidden', tab !== 'granular');
      const extra = ' flex items-center gap-1.5';
      document.getElementById('logtab-general').className =
        tab === 'general'
          ? 'px-5 py-3 text-sm font-semibold border-b-2 border-indigo-500 text-indigo-600'
          : 'px-5 py-3 text-sm font-medium text-slate-500 hover:text-slate-700 border-b-2 border-transparent';
      document.getElementById('logtab-granular').className =
        tab === 'granular'
          ? `px-5 py-3 text-sm font-semibold border-b-2 border-indigo-500 text-indigo-600${extra}`
          : `px-5 py-3 text-sm font-medium text-slate-500 hover:text-slate-700 border-b-2 border-transparent${extra}`;
      if (tab === 'general') loadLogs(); else loadGranularLogs();
    }
    function refreshLogTab() {
      if (currentLogTab === 'general') loadLogs(); else loadGranularLogs();
    }
        if (!logs.length) {
          el.innerHTML = '<span class="text-slate-500">Sin logs aún.</span>';
          return;
        }
        el.innerHTML = logs.map(l =>
          `<p><span class="text-slate-500">${esc(l.time)}</span> ` +
          `<span class="font-semibold ${LOG_COLOR[l.level] ?? 'text-white'}">[${l.level}]</span> ` +
          `<span class="text-slate-200">${esc(l.message)}</span></p>`
        ).join('');
      } catch(e) {}
    }

    // ── Data table ───────────────────────────────────────────────────────────
    async function loadTable(tab) {
      try {
        const rows = await fetch(`/data/${tab}`).then(r => r.json());
        if (!Array.isArray(rows) || !rows.length) {
          document.getElementById('table-head').innerHTML = '';
          document.getElementById('table-body').innerHTML =
            '<tr><td class="px-4 py-8 text-slate-400 text-center" colspan="99">Sin datos aún.</td></tr>';
          return;
        }
        const cols = Object.keys(rows[0]);
        document.getElementById('table-head').innerHTML =
          '<tr>' + cols.map(c =>
            `<th class="px-3 py-2 font-medium whitespace-nowrap">${esc(c)}</th>`
          ).join('') + '</tr>';
        document.getElementById('table-body').innerHTML = rows.map(r =>
          '<tr class="hover:bg-slate-50">' +
          cols.map(c => {
            const v = r[c];
            const display = v === null || v === undefined
              ? '<span class="text-slate-300">null</span>'
              : esc(String(v));
            return `<td class="px-3 py-1.5 whitespace-nowrap">${display}</td>`;
          }).join('') + '</tr>'
        ).join('');
      } catch(e) {}
    }

    function switchTab(tab) {
      currentTab = tab;
      ['raw', 'clean', 'rejected'].forEach(t => {
        const btn = document.getElementById(`tab-${t}`);
        const extra = t === 'rejected' ? ' flex items-center gap-1.5' : '';
        if (t === tab) {
          btn.className = `px-5 py-3 text-sm font-semibold border-b-2 border-indigo-500 text-indigo-600${extra}`;
        } else {
          btn.className = `px-5 py-3 text-sm font-medium text-slate-500 hover:text-slate-700 border-b-2 border-transparent${extra}`;
        }
      });
      loadTable(tab);
    }

    // ── Run ETL ──────────────────────────────────────────────────────────────
    async function runETL() {
      const btn = document.getElementById('run-btn');
      btn.disabled = true;
      try {
        const res = await fetch('/run', { method: 'POST' });
        const data = await res.json();
        if (res.status === 409) {
          alert(data.message);
        } else {
          const badge = document.getElementById('status-badge');
          badge.className = `px-3 py-1 rounded-full text-sm font-medium ${STATUS_STYLE.running}`;
          badge.textContent = STATUS_LABEL.running;
          startPolling();
        }
      } catch(e) { alert('No se pudo iniciar el ETL'); }
      btn.disabled = false;
    }
    // ── Live refresh (siempre activo) ────────────────────────────────────────
    let liveInterval = null;
    function startLiveRefresh() {
      if (liveInterval) return;
      liveInterval = setInterval(() => {
        if (currentLogTab === 'general') loadLogs(); else loadGranularLogs();
        loadTable(currentTab);
      }, 5000);
    }

    // ── Vaciar tablas ─────────────────────────────────────────────────────────
    async function truncateTables() {
      if (!confirm('¿Seguro? Esto eliminará TODOS los datos de bank_raw, bank_clean y etl_reports en Render y Supabase. Esta acción no se puede deshacer.')) return;
      try {
        const res = await fetch('/truncate', { method: 'POST' });
        const data = await res.json();
        const msgs = Object.entries(data).map(([k,v]) => `${k}: ${v}`).join(' · ');
        showToast(`Tablas vaciadas → ${msgs}`, 'success');
        loadTable(currentTab);
        loadReport();
        document.getElementById('metrics-grid').innerHTML = '';
      } catch(e) {
        showToast('Error al vaciar tablas', 'error');
      }
    }

    // ── Toast ─────────────────────────────────────────────────────────────────
    function showToast(msg, type = 'success') {
      const t = document.createElement('div');
      const colors = type === 'error'
        ? 'bg-red-600 text-white'
        : type === 'warning'
        ? 'bg-amber-500 text-white'
        : 'bg-emerald-600 text-white';
      t.className = `fixed bottom-5 right-5 z-50 px-5 py-3 rounded-xl shadow-lg text-sm font-medium ${colors} transition-opacity duration-500`;
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 500); }, 3500);
    }

    // ── Init ─────────────────────────────────────────────────────────────────
    loadStatus();
    loadReport();
    loadLogs();
    loadTable('raw');
    loadCurrentFile();
    startLiveRefresh();

    // ── Upload ───────────────────────────────────────────────────────────────
    let _pendingFile = null;

    function handleDrop(e) {
      e.preventDefault();
      document.getElementById('drop-zone').classList.remove('border-indigo-500', 'bg-indigo-50');
      const file = e.dataTransfer.files[0];
      if (file) setPendingFile(file);
    }

    function handleFileSelect(e) {
      const file = e.target.files[0];
      if (file) setPendingFile(file);
    }

    function setPendingFile(file) {
      _pendingFile = file;
      const kb = (file.size / 1024).toFixed(1);
      document.getElementById('upload-status').textContent =
        `Listo para subir: ${file.name} (${kb} KB)`;
      document.getElementById('upload-status').className = 'text-xs text-indigo-600 min-h-[1.2rem]';
      document.getElementById('upload-run-btn').disabled = false;
    }

    async function uploadAndRun() {
      if (!_pendingFile) return;
      if (_etlState === 'running') { alert('El ETL ya está en ejecución'); return; }

      const statusEl = document.getElementById('upload-status');
      const btn = document.getElementById('upload-run-btn');
      btn.disabled = true;
      statusEl.textContent = 'Subiendo archivo…';
      statusEl.className = 'text-xs text-amber-600 min-h-[1.2rem]';

      const form = new FormData();
      form.append('file', _pendingFile);

      try {
        const res = await fetch('/upload', { method: 'POST', body: form });
        const data = await res.json();
        if (!res.ok) {
          statusEl.textContent = `Error: ${data.error}`;
          statusEl.className = 'text-xs text-red-500 min-h-[1.2rem]';
          btn.disabled = false;
          return;
        }
        statusEl.textContent = `✓ ${data.file} subido correctamente`;
        statusEl.className = 'text-xs text-emerald-600 min-h-[1.2rem]';
        _pendingFile = null;
        document.getElementById('file-input').value = '';
        await loadCurrentFile();
        // Lanzar ETL automáticamente
        await runETL();
      } catch(e) {
        statusEl.textContent = 'Error de red al subir el archivo';
        statusEl.className = 'text-xs text-red-500 min-h-[1.2rem]';
        btn.disabled = false;
      }
    }

    async function loadCurrentFile() {
      try {
        const data = await fetch('/current-file').then(r => r.json());
        const src = document.getElementById('active-file-source');
        const runBtn = document.getElementById('run-btn');
        if (!data.file || data.source === 'ninguno') {
          document.getElementById('active-file-name').textContent = 'Ninguno';
          src.textContent = 'requerido';
          src.className = 'ml-2 px-2 py-0.5 rounded-full text-xs bg-red-100 text-red-600';
          runBtn.disabled = true;
          runBtn.title = 'Sube un archivo primero';
        } else {
          const kb = (data.bytes / 1024).toFixed(1);
          document.getElementById('active-file-name').textContent = `${data.file} (${kb} KB)`;
          src.textContent = 'subido';
          src.className = 'ml-2 px-2 py-0.5 rounded-full text-xs bg-emerald-100 text-emerald-700';
          runBtn.disabled = false;
          runBtn.title = '';
        }
      } catch(e) {}
    }
  </script>
</body>
</html>
